<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResTest</title>

    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="background"></div>

<header class="hero">
    <h1>ResTest</h1>
    <p>Crie endpoints mockados reais para testes frontend</p>
</header>

<main class="container">

    <section class="card form-card">

        <div class="field">
            <label>Nome do endpoint</label>
            <input type="text" id="label" placeholder="Usuários API">
        </div>

        <div class="grid">
            <div class="field">
                <label>Status HTTP</label>
                <select id="statusCode">
                    <option value="200">200</option>
                    <option value="201">201</option>
                    <option value="400">400</option>
                    <option value="401">401</option>
                    <option value="403">403</option>
                    <option value="404">404</option>
                    <option value="500">500</option>
                </select>
            </div>

            <div class="field">
                <label>Delay (ms)</label>
                <input type="number" id="delayMs" value="0">
            </div>
        </div>

        <div class="field">
            <label>Payload JSON</label>
            <textarea id="payload" rows="12">
{
  "message": "Olá mundo"
}
            </textarea>
        </div>

        <button id="createBtn">
            Criar Endpoint
        </button>

        <button class="format-btn" onclick="formatJson()">
        Formatar JSON
        </button>

    </section>

    <section class="card result-card">

        <div class="result-header">
            <h2>Endpoints Criados</h2>
            <button id="reloadBtn">Atualizar</button>
        </div>

        <div id="endpointList" class="endpoint-list">
        </div>

    </section>

</main>

<script src="code.js"></script>
</body>
</html>
