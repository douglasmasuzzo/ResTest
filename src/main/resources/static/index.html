<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResTest</title>

    <!-- Cache-busting: ?v=2 força o navegador a baixar a versão mais recente -->
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

<header class="hero">
    <h1>ResTest</h1>
    <p>Crie endpoints mockados reais para testes frontend</p>
</header>

<main class="container">

    <!-- Formulário de criação / edição de endpoint -->
    <section class="card form-card">

        <div class="field">
            <label>Nome do endpoint</label>
            <input type="text" id="label" placeholder="Ex: Usuários API">
        </div>

        <!-- Status e Delay em grid de duas colunas -->
        <div class="grid">
            <div class="field">
                <label>Status HTTP</label>
                <select id="statusCode">
                    <option value="200">200 — OK</option>
                    <option value="201">201 — Created</option>
                    <option value="400">400 — Bad Request</option>
                    <option value="401">401 — Unauthorized</option>
                    <option value="403">403 — Forbidden</option>
                    <option value="404">404 — Not Found</option>
                    <option value="500">500 — Internal Server Error</option>
                </select>
            </div>

            <div class="field">
                <label>Delay (ms)</label>
                <input type="number" id="delayMs" value="0" min="0" max="30000">
            </div>
        </div>

        <div class="field">
            <label>Payload JSON</label>
            <textarea id="payload" rows="12">
{
  "message": "Olá mundo"
}
            </textarea>
        </div>

        <button id="createBtn">Criar Endpoint</button>
        <button class="format-btn" onclick="formatJson()">Formatar JSON</button>

    </section>

    <!-- Lista de endpoints cadastrados -->
    <section class="card result-card">

        <div class="result-header">
            <h2>Endpoints Criados</h2>
            <button id="reloadBtn">Atualizar</button>
        </div>

        <div id="endpointList" class="endpoint-list">
            <!-- Preenchido dinamicamente pelo script.js -->
        </div>

    </section>

</main>

<!-- Cache-busting: ?v=2 força o navegador a baixar o script atualizado -->
<script src="/js/script.js?v=2"></script>
</body>
</html>
